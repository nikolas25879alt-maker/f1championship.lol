<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 - Driver Stats</title>
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#0a0a0c; --panel:rgba(18,19,24,.86); --line:rgba(255,255,255,.10); --text:#f4f7fb; --muted:#a4adba; --red:#e10600; --shadow:0 24px 70px rgba(0,0,0,.55); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--text); background:linear-gradient(180deg,#060608 0%, #0a0b0f 100%); }
    .wrap { max-width:1800px; margin:0 auto; padding:22px; }
    .back { display:inline-flex; text-decoration:none; color:#fff; padding:12px 16px; border-radius:16px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); margin-bottom:16px; }
    .hero { background:linear-gradient(135deg, rgba(225,6,0,.24), rgba(255,255,255,.02)); border:1px solid rgba(255,255,255,.08); border-radius:34px; box-shadow:var(--shadow); overflow:hidden; }
    .hero-top { display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:flex-start; padding:24px 24px 18px; }
    .badge { display:inline-flex; padding:9px 12px; border-radius:999px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10); font-size:12px; font-weight:800; text-transform:uppercase; }
    h1 { margin:12px 0 0; font-size:clamp(32px,5vw,62px); line-height:1; letter-spacing:-.05em; }
    .meta { margin-top:10px; color:rgba(244,247,251,.82); font-size:15px; line-height:1.6; max-width:900px; }
    .hero-body { padding:0 24px 24px; display:grid; gap:18px; }

    /* Top stat cards */
    .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }
    .stat { padding:18px 20px; border-radius:24px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); }
    .stat .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
    .stat .v { margin-top:10px; font-size:30px; font-weight:900; line-height:1; }
    .stat .sub { margin-top:4px; font-size:12px; color:var(--muted); }

    /* Main layout */
    .content { display:grid; grid-template-columns:1fr 340px; gap:18px; }

    /* Race results table */
    .panel { background:rgba(18,19,24,.98); border:1px solid rgba(255,255,255,.08); border-radius:28px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.22); }
    .panel-h { padding:18px 20px 0; }
    .panel-h h2 { margin:0; font-size:20px; }
    .panel-b { padding:18px 20px 20px; }

    .result-head, .result-row { display:grid; grid-template-columns:50px 1fr 100px 70px 70px; gap:10px; align-items:center; }
    .result-head { padding:12px 14px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:#d7dde8; font-size:12px; text-transform:uppercase; letter-spacing:.08em; font-weight:800; }
    .result-row { padding:13px 14px; border-top:1px solid rgba(255,255,255,.06); }
    .result-row:first-child { border-top:none; }
    .pos-badge { width:34px; height:34px; border-radius:12px; display:grid; place-items:center; background:rgba(225,6,0,.18); font-weight:900; font-size:14px; }
    .pos-badge.p1 { background:rgba(255,215,0,.18); color:#fde68a; }
    .pos-badge.p2 { background:rgba(192,192,192,.18); color:#e2e8f0; }
    .pos-badge.p3 { background:rgba(205,127,50,.18); color:#fbbf77; }
    .pos-badge.dnf { background:rgba(225,6,0,.12); color:#ff8f8f; font-size:11px; }
    .race-name { font-weight:700; font-size:14px; }
    .race-date { font-size:12px; color:var(--muted); margin-top:2px; }
    .pts-cell { font-weight:900; font-size:16px; }
    .finish-cell { font-size:13px; color:var(--muted); }

    /* Side panels */
    .side { display:grid; gap:18px; align-content:start; }
    .note-box { padding:14px 16px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); font-size:13px; line-height:1.65; color:rgba(244,247,251,.82); }

    /* Position chart bars */
    .chart { display:grid; gap:8px; }
    .chart-row { display:grid; grid-template-columns:30px 1fr 36px; gap:10px; align-items:center; font-size:13px; }
    .bar-wrap { height:12px; border-radius:999px; background:rgba(255,255,255,.06); overflow:hidden; }
    .bar { height:100%; border-radius:999px; background:linear-gradient(90deg, var(--red), #ff4a4a); transition:width .4s ease; }
    .bar-count { font-weight:800; font-size:13px; text-align:right; }

    /* Team tag */
    .team-tag { display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); font-size:13px; font-weight:700; margin-top:12px; }
    .team-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .team-logo-sm { width:22px; height:22px; object-fit:contain; border-radius:4px; }

    .loading { padding:18px; border-radius:18px; border:1px dashed rgba(255,255,255,.18); color:var(--muted); font-size:14px; }
    .brand-credit { position:fixed; right:18px; bottom:18px; z-index:9000; padding:10px 14px; border-radius:999px; border:1px solid rgba(255,255,255,.08); background:rgba(8,8,12,.82); backdrop-filter:blur(10px); font-size:.9rem; color:var(--muted); box-shadow:0 14px 30px rgba(0,0,0,.28); }
    .brand-credit a { color:var(--text); text-decoration:none; border-bottom:1px solid rgba(255,255,255,.18); }
    .brand-credit a:hover { color:#fff; border-color:rgba(255,255,255,.55); }
    select option { background-color:#121318; color:var(--text); }
    select { appearance:none; background:rgba(255,255,255,.06); color:var(--text); border:1px solid rgba(255,255,255,.10); padding:13px 16px; border-radius:16px; outline:none; }

    @media (max-width:1100px) { .content { grid-template-columns:1fr; } .stats-row { grid-template-columns:repeat(3,1fr); } }
    @media (max-width:700px) { .stats-row { grid-template-columns:1fr 1fr; } .result-head, .result-row { grid-template-columns:42px 1fr 60px 56px; } .hide-sm { display:none; } h1 { font-size:36px; } }
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Back to seasons</a>
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="badge" id="seasonTag">Season</div>
        <h1 id="driverName">Loading...</h1>
        <div id="teamTagWrap"></div>
      </div>
      <select id="driverSelect" style="min-width:200px;align-self:center"></select>
    </div>

    <div class="hero-body">
      <!-- Top stats -->
      <div class="stats-row">
        <div class="stat"><div class="k">Total Points</div><div class="v" id="statPts">—</div></div>
        <div class="stat"><div class="k">Races</div><div class="v" id="statRaces">—</div></div>
        <div class="stat"><div class="k">Wins</div><div class="v" id="statWins">—</div></div>
        <div class="stat"><div class="k">Podiums</div><div class="v" id="statPodiums">—</div></div>
        <div class="stat"><div class="k">DNFs</div><div class="v" id="statDnf">—</div></div>
      </div>

      <!-- Main content -->
      <div class="content">
        <section class="panel">
          <div class="panel-h"><h2>Race by race</h2></div>
          <div class="panel-b">
            <div class="result-head"><div>Pos</div><div>Race</div><div class="hide-sm">Country</div><div>Pts</div><div>Fin.</div></div>
            <div id="raceResults"><div class="loading">Loading...</div></div>
          </div>
        </section>

        <aside class="side">
          <section class="panel">
            <div class="panel-h"><h2>Position breakdown</h2></div>
            <div class="panel-b"><div class="chart" id="posChart"><div class="loading">Loading...</div></div></div>
          </section>
          <section class="panel">
            <div class="panel-h"><h2>Best result</h2></div>
            <div class="panel-b"><div class="note-box" id="bestResult">—</div></div>
          </section>
        </aside>
      </div>
    </div>
  </div>
</div>
<div class="brand-credit">By Scripty</div>

<script>
  const SUPABASE_URL = "https://bswuztumpvoleajheeej.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzd3V6dHVtcHZvbGVhamhlZWVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NDM1ODksImV4cCI6MjA5ODAxOTU4OX0.FyBZun8WwlhpvXLs4k2mEdNc_7LvZWMHy7dT-26rXqs";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(location.search);
  let seasonId = params.get("season");
  let driverId = params.get("driver");

  const TEAM_LOGOS = {
    "ferrari":"icons/ferrari.svg","red bull racing":"icons/redbull.svg","mercedes":"icons/mercedes.svg",
    "mclaren":"icons/mclaren.svg","aston martin":"icons/aston-martin.svg","alpine":"icons/alpine.svg",
    "williams":"icons/williams-racing.svg","haas":"icons/moneygram-haas.svg",
    "visa cash app rb":"icons/visa.svg","stake kick sauber":"icons/kick.svg",
  };
  function getTeamLogo(n){ if(!n) return null; const k=n.toLowerCase().trim(); for(const [key,v] of Object.entries(TEAM_LOGOS)) if(k.includes(key)||key.includes(k)) return v; return null; }

  let allDrivers = [], allRaces = [], allResults = [], currentSeason = null;

  async function init() {
    // Load seasons to get name
    const { data: seasons } = await sb.from("seasons").select("*").order("display_order", { ascending: true });
    if (!seasonId && seasons?.length) seasonId = seasons[0].id;
    currentSeason = seasons?.find(s => s.id === seasonId);
    if (currentSeason) document.getElementById("seasonTag").textContent = currentSeason.name;

    // Load drivers, races, results
    const [driversRes, racesRes, resultsRes] = await Promise.all([
      sb.from("drivers").select("*, teams(name,color)").eq("season_id", seasonId),
      sb.from("races").select("*").eq("season_id", seasonId).order("round_number"),
      sb.from("results").select("*").eq("season_id", seasonId),
    ]);
    allDrivers = driversRes.data || [];
    allRaces   = racesRes.data   || [];
    allResults = resultsRes.data || [];

    // Populate driver select
    const sel = document.getElementById("driverSelect");
    sel.innerHTML = allDrivers.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    if (!driverId && allDrivers.length) driverId = allDrivers[0].id;
    if (driverId) sel.value = driverId;
    sel.onchange = e => { driverId = e.target.value; render(); };

    render();
  }

  function render() {
    const driver = allDrivers.find(d => d.id === driverId);
    if (!driver) return;

    document.getElementById("driverName").textContent = driver.name;
    document.title = `${driver.name} • Stats`;

    // Team tag
    const team = driver.teams;
    const logo = getTeamLogo(team?.name);
    const logoHtml = logo
      ? `<img class="team-logo-sm" src="${logo}" alt="${team?.name}" onerror="this.style.display='none'">`
      : `<span class="team-dot" style="background:${team?.color||'#555'}"></span>`;
    document.getElementById("teamTagWrap").innerHTML = team
      ? `<div class="team-tag">${logoHtml} ${team.name}</div>` : "";

    // Filter results for this driver
    const myResults = allResults.filter(r => r.driver_id === driverId);
    const raceMap = Object.fromEntries(allRaces.map(r => [r.id, r]));

    // Stats
    const totalPts  = myResults.reduce((s, r) => s + (r.points || 0), 0);
    const wins      = myResults.filter(r => Number(r.position) === 1).length;
    const podiums   = myResults.filter(r => Number(r.position) >= 1 && Number(r.position) <= 3).length;
    const dnfs      = myResults.filter(r => Number(r.position) === 0).length;

    document.getElementById("statPts").textContent    = totalPts;
    document.getElementById("statRaces").textContent  = myResults.length;
    document.getElementById("statWins").textContent   = wins;
    document.getElementById("statPodiums").textContent = podiums;
    document.getElementById("statDnf").textContent    = dnfs;

    // Race-by-race table
    const sorted = [...myResults].sort((a, b) => {
      const ra = raceMap[a.race_id], rb = raceMap[b.race_id];
      return (ra?.round_number || 0) - (rb?.round_number || 0);
    });

    document.getElementById("raceResults").innerHTML = sorted.length ? sorted.map(r => {
      const race = raceMap[r.race_id] || {};
      const isDNF = Number(r.position) === 0;
      const pos = isDNF ? "DNF" : r.position;
      const posClass = r.position == 1 ? "p1" : r.position == 2 ? "p2" : r.position == 3 ? "p3" : isDNF ? "dnf" : "";
      return `<div class="result-row">
        <div><div class="pos-badge ${posClass}">${pos}</div></div>
        <div>
          <div class="race-name">${race.name || "—"}</div>
          <div class="race-date">${race.date ? new Date(race.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : ""}</div>
        </div>
        <div class="finish-cell hide-sm">${race.country || "—"}</div>
        <div class="pts-cell">${isDNF ? 0 : (r.points ?? 0)}</div>
        <div class="finish-cell">${isDNF ? "<span style='color:#ff8f8f'>DNF</span>" : `P${r.position}`}</div>
      </div>`;
    }).join("") : '<div class="loading">No results yet for this driver.</div>';

    // Position breakdown chart
    const posCounts = {};
    myResults.forEach(r => {
      if (Number(r.position) === 0) { posCounts["DNF"] = (posCounts["DNF"] || 0) + 1; return; }
      const p = `P${r.position}`;
      posCounts[p] = (posCounts[p] || 0) + 1;
    });
    const maxCount = Math.max(...Object.values(posCounts), 1);
    const posEntries = Object.entries(posCounts).sort((a, b) => {
      if (a[0] === "DNF") return 1; if (b[0] === "DNF") return -1;
      return parseInt(a[0].slice(1)) - parseInt(b[0].slice(1));
    });
    document.getElementById("posChart").innerHTML = posEntries.length
      ? posEntries.map(([label, count]) => `
        <div class="chart-row">
          <div style="color:var(--muted);font-size:12px;font-weight:700">${label}</div>
          <div class="bar-wrap"><div class="bar" style="width:${(count/maxCount)*100}%"></div></div>
          <div class="bar-count">${count}</div>
        </div>`).join("")
      : '<div class="loading">No data.</div>';

    // Best result
    const bestFinish = myResults.filter(r => Number(r.position) > 0).sort((a,b) => a.position - b.position)[0];
    if (bestFinish) {
      const bestRace = raceMap[bestFinish.race_id];
      document.getElementById("bestResult").innerHTML =
        `<strong>P${bestFinish.position}</strong> at ${bestRace?.name || "—"}<br>
        <span style="color:var(--muted);font-size:12px">${bestRace?.date ? new Date(bestRace.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : ""}</span><br>
        <span style="font-size:13px;color:var(--muted);margin-top:4px;display:block">${bestFinish.points} pts scored</span>`;
    } else {
      document.getElementById("bestResult").textContent = "No finishes yet.";
    }
  }

  init();
</script>
</body>
</html>
