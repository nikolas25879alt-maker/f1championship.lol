<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0b0e1a;
            color: #eef2fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(ellipse 800px 800px at 0% 100%, rgba(255,34,85,0.12) 0%, transparent 60%),
                              radial-gradient(ellipse 800px 800px at 100% 0%, rgba(0,170,255,0.10) 0%, transparent 60%);
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100,150,255,0.15);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff2255, #ff44aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px rgba(255,34,85,0.3));
        }
        .logo .sub {
            font-size: 14px;
            color: #9aa8c2;
            margin-top: 6px;
        }
        .card {
            background: rgba(16,21,37,0.7);
            border: 1px solid rgba(100,140,220,0.12);
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 20px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff2255, #ff44aa);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,34,85,0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,34,85,0.6);
        }
        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00ffdd);
            color: #0a0a0f;
            box-shadow: 0 4px 20px rgba(0,255,136,0.3);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,255,136,0.5);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #9aa8c2;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0b0e1a;
            border: 1px solid rgba(100,140,220,0.2);
            border-radius: 10px;
            color: #eef2fa;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff44aa;
            box-shadow: 0 0 0 3px rgba(255,68,170,0.2);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name {
            font-size: 18px;
            font-weight: 600;
        }
        .vip-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0b0e1a;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            margin-left: 8px;
            box-shadow: 0 0 16px rgba(255,215,0,0.4);
        }
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(0,170,255,0.06);
            border-left: 3px solid #00aaff;
            font-size: 14px;
            color: #9aa8c2;
            transition: all 0.3s;
        }
        .status.success {
            border-left-color: #00ff88;
            color: #b0f0d0;
            background: rgba(0,255,136,0.06);
        }
        .status.error {
            border-left-color: #ff2255;
            color: #ff88aa;
            background: rgba(255,34,85,0.06);
        }
        .warning {
            color: #ff88aa;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .hidden { display: none; }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #5a6a85;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚀 VIP Builder</h1>
            <div class="sub">Login · Paste webhook · Download</div>
        </div>

        <!-- AUTH SECTION -->
        <div id="authSection" class="card">
            <button id="loginBtn" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Login with Discord
            </button>
            <div id="authError" class="warning" style="display:block; text-align:center;"></div>
        </div>

        <!-- VIP BUILDER SECTION -->
        <div id="vipSection" class="hidden">
            <div class="card">
                <div class="user-info">
                    <div class="user-avatar"><img id="avatarImg" src="" alt="avatar" /></div>
                    <div>
                        <div class="user-name">
                            <span id="userNameText"></span>
                            <span class="vip-badge">VIP</span>
                        </div>
                        <div style="font-size:13px; color:#9aa8c2;" id="userIdDisplay"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="webhookInput">Your Discord Webhook URL</label>
                    <input type="text" id="webhookInput" placeholder="https://discord.com/api/webhooks/..." />
                    <div id="webhookWarning" class="warning">Please enter a valid webhook URL.</div>
                </div>

                <div class="form-group" style="margin-bottom:16px;">
                    <label for="buildName">Output name (optional)</label>
                    <input type="text" id="buildName" value="Scripty" maxlength="40" />
                </div>

                <button id="downloadBtn" class="btn btn-success">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Patched EXE
                </button>

                <div id="status" class="status">Ready.</div>
            </div>
        </div>

        <div class="footer">&copy; 2026 · All rights reserved</div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const supabaseUrl = "https://vlruwjhgbwlvonfvyxkw.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZscnV3amhnYndsdm9uZnZ5eGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTc1ODAsImV4cCI6MjA5OTUzMzU4MH0.-xHec_X-BmXDb4iyadMHfDf8DB3SlOIEGC7XCDqBck8";
        const workerUrl = "https://misty-firefly-4403.nikolas25879alt.workers.dev/";

        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // DOM refs
        const authSection = document.getElementById('authSection');
        const vipSection = document.getElementById('vipSection');
        const loginBtn = document.getElementById('loginBtn');
        const authError = document.getElementById('authError');
        const downloadBtn = document.getElementById('downloadBtn');
        const buildNameInput = document.getElementById('buildName');
        const statusDiv = document.getElementById('status');
        const userNameText = document.getElementById('userNameText');
        const userIdDisplay = document.getElementById('userIdDisplay');
        const avatarImg = document.getElementById('avatarImg');
        const webhookInput = document.getElementById('webhookInput');
        const webhookWarning = document.getElementById('webhookWarning');

        function setStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status';
            if (type === 'success') statusDiv.classList.add('success');
            else if (type === 'error') statusDiv.classList.add('error');
        }

        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
        }
        function hideError() { authError.style.display = 'none'; }

        // ---------- AUTH STATE CHANGE ----------
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            console.log('Auth event:', event);
            if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                if (window.location.hash) {
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                }
                if (session) {
                    await handleUser(session.user);
                }
            } else if (event === 'SIGNED_OUT') {
                authSection.classList.remove('hidden');
                vipSection.classList.add('hidden');
                setStatus('Logged out.', 'info');
            }
        });

        // ---------- HANDLE USER ----------
        async function handleUser(user) {
            // Use Supabase UUID (user.id) for the lookup
            const userId = user.id;
            console.log('Supabase UUID:', userId);

            // Show user info (Discord name/avatar)
            const discordId = user.user_metadata?.provider_id || 'N/A';
            const avatarUrl = user.user_metadata?.avatar_url ?
                `https://cdn.discordapp.com/avatars/${discordId}/${user.user_metadata.avatar_url}.png` :
                'https://cdn.discordapp.com/embed/avatars/0.png';
            avatarImg.src = avatarUrl;
            userNameText.textContent = user.user_metadata?.full_name || user.user_metadata?.name || 'User';
            userIdDisplay.textContent = `Discord ID: ${discordId}`;

            // Check VIP status using the UUID
            try {
                const { data, error } = await supabaseClient
                    .from('vip_users')
                    .select('user_id')
                    .eq('user_id', userId)
                    .maybeSingle();

                if (error) throw error;

                if (data) {
                    // VIP – show builder
                    authSection.classList.add('hidden');
                    vipSection.classList.remove('hidden');
                    setStatus('✅ VIP – enter webhook and download.', 'success');
                    downloadBtn.disabled = false;
                } else {
                    // Not VIP
                    authSection.classList.add('hidden');
                    vipSection.classList.add('hidden');
                    showError('❌ You are not authorized. Contact support.');
                }
            } catch (err) {
                console.error('VIP check error:', err);
                showError('Error checking VIP: ' + err.message);
            }
        }

        // ---------- LOGIN ----------
        loginBtn.addEventListener('click', async () => {
            hideError();
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'discord',
                    options: {
                        redirectTo: window.location.href
                    }
                });
                if (error) throw error;
                setStatus('Redirecting to Discord...', 'info');
                loginBtn.disabled = true;
            } catch (err) {
                showError('Login failed: ' + err.message);
                loginBtn.disabled = false;
            }
        });

        // ---------- DOWNLOAD ----------
        downloadBtn.addEventListener('click', async () => {
            const webhook = webhookInput.value.trim();
            const buildName = buildNameInput.value.trim() || 'Scripty';

            // Validate
            if (!webhook) {
                webhookWarning.style.display = 'block';
                setStatus('Please enter your webhook URL.', 'error');
                return;
            }
            webhookWarning.style.display = 'none';
            if (!webhook.startsWith('https://discord.com/api/webhooks/')) {
                webhookWarning.style.display = 'block';
                setStatus('Invalid webhook URL format.', 'error');
                return;
            }

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                setStatus('Please login first.', 'error');
                return;
            }
            const userId = session.user.id; // Supabase UUID
            setStatus('Building...', 'info');
            downloadBtn.disabled = true;

            const url = new URL(workerUrl);
            url.searchParams.set('uid', userId);
            url.searchParams.set('webhook', webhook);
            url.searchParams.set('name', buildName);

            try {
                const a = document.createElement('a');
                a.href = url.toString();
                a.download = `${buildName}.exe`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setStatus('✅ Download started!', 'success');
            } catch (err) {
                setStatus('Download failed: ' + err.message, 'error');
            } finally {
                downloadBtn.disabled = false;
            }
        });

        // ---------- INIT ----------
        (async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                if (window.location.hash) {
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                }
                await handleUser(session.user);
            }
        })();
    </script>
</body>
</html>
